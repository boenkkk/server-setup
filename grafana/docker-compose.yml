# https://medium.com/@murat.bilal/monitoring-host-vm-with-grafana-and-prometheus-in-docker-faeffc4aa18d
# https://gemini.google.com/share/cb6943911564
# https://notebooklm.google.com/notebook/ddd285ba-eeec-460e-aba4-42a1522e0bd8
# https://grafana.com/grafana/dashboards/1860-node-exporter-full/
# 1860

version: '3.8'

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - app-tier
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # You should change this after first login
    networks:
      - app-tier
    depends_on:
      - prometheus

  node-exporter:
    image: quay.io/prometheus/node-exporter
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    volumes:
      - '/:/host:ro,rslave'

networks:
  app-tier:
    driver: bridge