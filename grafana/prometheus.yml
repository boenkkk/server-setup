global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Optional: Docker daemon metrics (requires daemon configuration)
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['host.docker.internal:9323']