# https://github.com/firefly-iii/firefly-iii?tab=readme-ov-file
# https://docs.firefly-iii.org/how-to/firefly-iii/installation/docker/
# https://raw.githubusercontent.com/firefly-iii/docker/main/docker-compose.yml

services:
  firefly_iii_core:
    image: fireflyiii/core:latest
    hostname: firefly_iii_core
    container_name: firefly_iii_core
    restart: always
    volumes:
      - firefly_iii_upload:/var/www/html/storage/upload
    env_file: .env
    networks:
      - app-tier
    ports:
      - 80:8080
    # depends_on:
      # - firefly_iii_db
  # firefly_iii_db:
  #   image: mariadb:lts
  #   hostname: db
  #   container_name: firefly_iii_db
  #   restart: always
  #   env_file: .db.env
  #   networks:
  #     - firefly_iii
  #   volumes:
  #     - firefly_iii_db:/var/lib/mysql
  firefly_iii_cron:
    #
    # To make this work, set STATIC_CRON_TOKEN in your .env file or as an environment variable
    # The STATIC_CRON_TOKEN must be *exactly* 32 characters long
    #
    image: alpine
    restart: always
    container_name: firefly_iii_cron
    env_file: .env
    command: sh -c "
      apk add tzdata && \
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- http://firefly_iii_core:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\"
      | crontab - && \
      crond -f -L /dev/stdout"
    networks:
      - app-tier
    depends_on:
      - firefly_iii_core

volumes:
  firefly_iii_upload:
  # firefly_iii_db:

networks:
  app-tier:
    external: true
