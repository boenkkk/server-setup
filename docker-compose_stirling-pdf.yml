services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:2.5.2
    container_name: stirling-pdf
    networks:
      - app-tier
    ports:
      - '8082:8080'
    volumes:
      - /opt/stirling-pdf/stirling-data/tessdata:/usr/share/tessdata  # OCR language files
      - /opt/stirling-pdf/stirling-data/configs:/configs               # Settings & database
      - /opt/stirling-pdf/stirling-data/logs:/logs                     # Application logs
      - /opt/stirling-pdf/stirling-data/pipeline:/pipeline             # Automation configs
    environment:
      - SECURITY_ENABLELOGIN=false    # Set true to enable user authentication
      - LANGS=en_GB                   # Interface language
    restart: always

networks:
  app-tier:
    external: true