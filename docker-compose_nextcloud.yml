services:
  # Note: MariaDB is external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/mariadb
  # nextcloud-db:
  #   # Note: Check the recommend version here: https://docs.nextcloud.com/server/latest/admin_manual/installation/system_requirements.html#server
  #   image: mariadb:lts
  #   restart: always
  #   command: --transaction-isolation=READ-COMMITTED
  #   volumes:
  #     - nextcloud-db:/var/lib/mysql
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=
  #     - MYSQL_PASSWORD=
  #     - MYSQL_DATABASE=nextcloud
  #     - MYSQL_USER=nextcloud

  # Note: Redis is an external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/redis
  # nextcloud-redis:
  #   image: redis:alpine
  #   restart: always

  # Note: for access using domain
  # 1. access to container
  # 2. nano config/config.php
  # 3. edit
  # 'trusted_domains' => 
  # array (
  #   0 => '192.168.1.6:8080',
  #   1 => 'nextcloud.boenkkk.dev',
  # ),
  # 'overwrite.cli.url' => 'https://nextcloud.boenkkk.dev',
  # 'overwriteprotocol' => 'https',
  # 'overwritehost' => 'nextcloud.boenkkk.dev',

  nextcloud-app:
    image: nextcloud
    container_name: nextcloud
    hostname: nextcloud
    restart: always
    ports:
      - 8080:80
    networks:
      - app-tier
    # depends_on:
    #   - nextcloud-redis
    #   - nextcloud-db
    volumes:
      - /opt/nextcloud-app/user-data:/var/www/html/data
      - /mnt/hdd500/nextcloud-app/user-data:/var/www/html/data
    environment:
      - POSTGRES_HOST=postgres-server:5432
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespostgres123

volumes:
  nextcloud-app:
  # nextcloud-db:
networks:
  app-tier:
    external: true
