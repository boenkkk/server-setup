services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminminioadmin123
    volumes:
      - minio_data:/data
    networks:
      - app-tier
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;

      mc alias set local http://minio:9000 minioadmin minioadminminioadmin123;

      mc mb -p local/minio-files;

      mc anonymous set none local/minio-files;

      echo 'MinIO bucket initialized: minio-files';
      "
    networks:
      - app-tier
    restart: "no"

volumes:
  minio_data:

networks:
  app-tier:
    external: true